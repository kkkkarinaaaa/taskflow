<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>TaskFlow</h1>
    <p>TaskFlow допомагає швидко додавати, переглядати та позначати особисті задачі як виконані.</p>

    <section class="task-form">
      <input type="text" id="taskInput" placeholder="Введіть задачу">
      <button id="addTaskButton">Додати</button>
    </section>

    <ul id="taskList"></ul>
    <footer class="footer">
  <p>TaskFlow MVP — навчальний проєкт для демонстрації Git workflow та роботи з feature-гілками.</p>
</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
